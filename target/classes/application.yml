spring:
  application:
    name: log-analyzer

  ai:
    ollama:
      base-url: http://localhost:11434
      chat:
        options:
          model: llama3.1
          temperature: 0.3
          num-threads: 4

server:
  port: 8080

logging:
  level:
    com.example.loganalyzer: DEBUG
    org.springframework.ai: DEBUG
