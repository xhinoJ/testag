name: QA After Merge

on:
  push:
    branches:
      - main

jobs:
  qa:
    name: Comprehensive QA
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 26
        uses: actions/setup-java@v4
        with:
          java-version: 26
          distribution: temurin
          cache: maven

      - name: Install Maven (if not present)
        run: which mvn || (apt-get update -q && apt-get install -y -q maven)

      - name: Compile
        run: mvn compile -q

      - name: Unit & Integration Tests
        run: mvn test

      - name: Run with Pitest (Mutation Testing)
        run: mvn org.pitest:pitest-maven:mutationCoverage
        continue-on-error: true

      - name: Dependency Analysis
        run: mvn dependency:analyze -q
        continue-on-error: true

      - name: SpotBugs / Static Analysis
        run: mvn spotbugs:check -q
        continue-on-error: true

      - name: JaCoCo Coverage (required)
        run: mvn jacoco:check -q

      - name: Checkstyle
        run: mvn checkstyle:check -q
        continue-on-error: true

      - name: Summarize Results
        run: |
          echo "## QA After Merge Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Check | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Compile | ✅ |" >> $GITHUB_STEP_SUMMARY
          echo "| Unit & Integration Tests | ✅ |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
